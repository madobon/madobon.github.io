name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: vp install

      - name: Install Slidev deck dependencies
        run: npm --prefix talks/welcome install

      - name: Build static site
        run: npx vite-ssg build

      - name: Build Slidev deck
        run: npm --prefix talks/welcome run build -- --out ../../dist/talks/welcome

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
